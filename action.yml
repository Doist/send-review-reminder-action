name: 'Send review reminder'
description: 'Reminds about pending GitHub pull request reviews via the Todoist Comms API'
author: 'Piotr Wilczek'
inputs:
  review_time_ms:
    description: 'Required review time'
    required: true
    default: '86400000'
  ignore_authors:
    description: 'Ignore pull requests from those authors'
    required: false
  client_id:
    description: 'OAuth client id of the Todoist Integration installed in the posting user''s account (the "Todoist Comms Send Message" integration). Provide via a GitHub secret.'
    required: true
  client_secret:
    description: 'OAuth client secret for the Todoist Integration ("Todoist Comms Send Message"). Provide via a GitHub secret.'
    required: true
  todoist_username:
    description: 'Todoist account email used to authenticate via the OAuth password grant (e.g. dev@doist.com). Provide via a GitHub secret.'
    required: true
  todoist_password:
    description: 'Todoist account password used to authenticate via the OAuth password grant'
    required: true
  thread_id:
    description: 'The Comms thread id to post reminder messages into'
    required: true
  message:
    description: 'Reminder message'
    required: true
    default: '%reviewer%, please review [#%pr_number% - %pr_title%](%pr_url%)'
  token:
    description: 'GitHub token'
    required: true
  ignore_draft_prs:
    description: 'Whether we should ignore draft PRs when checking for pending reviews'
    required: true
    default: false
  ignore_labels:
    description: 'If provided any PRs with these labels will skip the review reminder check'
    required: false
  ignore_prs_with_failing_checks:
    description: 'If the PR has any failing or errored status checks, ignore it'
    required: true
    default: false
  author_to_comms_mapping:
    description: 'A mapping of each possible reviewers GitHub username to their associated Comms (Todoist) user id. If provided it will ensure the correct user is notified in Comms when a review is overdue'
    required: false
  ignore_review_bots:
    description: 'Ignore reviews from these bot authors when checking for pending reviews. Useful for filtering out bot reviews that should not stop human review reminders.'
    required: false
    default: 'github-actions'
runs:
  using: 'node24'
  main: 'dist/index.js'
